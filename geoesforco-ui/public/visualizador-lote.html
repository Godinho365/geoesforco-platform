<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visualizador de Pontos por Lote e Subfase</title>
    <script src="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/maplibre-gl@4/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f5;
      }

      .container {
        display: flex;
        height: 100vh;
      }

      .sidebar {
        width: 320px;
        background: white;
        border-right: 1px solid #ddd;
        overflow-y: auto;
        padding: 16px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .map-container {
        flex: 1;
        position: relative;
      }

      #map {
        width: 100%;
        height: 100%;
      }

      h1 {
        font-size: 18px;
        margin-bottom: 12px;
        color: #333;
      }
      h2 {
        font-size: 14px;
        margin-top: 16px;
        margin-bottom: 8px;
        color: #666;
        font-weight: 600;
      }

      .form-group {
        margin-bottom: 12px;
      }

      label {
        display: block;
        font-size: 12px;
        color: #555;
        margin-bottom: 4px;
        font-weight: 500;
      }

      input,
      select {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #2196f3;
        box-shadow: 0 0 0 2px rgba(33, 150, 243, 0.1);
      }

      button {
        width: 100%;
        padding: 10px;
        background: #2196f3;
        color: white;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.2s;
      }

      button:hover {
        background: #1976d2;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }

      .loading {
        text-align: center;
        color: #999;
        margin: 16px 0;
      }
      .spinner {
        display: inline-block;
        width: 16px;
        height: 16px;
        border: 2px solid #f3f3f3;
        border-top: 2px solid #2196f3;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .results {
        margin-top: 16px;
        padding: 12px;
        background: #fafafa;
        border-radius: 4px;
        border-left: 4px solid #2196f3;
      }

      .results h3 {
        font-size: 13px;
        color: #333;
        margin-bottom: 8px;
      }

      .stat {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
        color: #666;
        margin-bottom: 4px;
      }

      .stat-value {
        font-weight: 600;
        color: #2196f3;
      }

      .ut-list {
        max-height: 300px;
        overflow-y: auto;
        margin-top: 8px;
      }

      .ut-item {
        padding: 8px;
        background: white;
        border: 1px solid #e0e0e0;
        border-radius: 3px;
        margin-bottom: 6px;
        font-size: 12px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .ut-item:hover {
        background: #f0f7ff;
        border-color: #2196f3;
      }

      .ut-item-name {
        font-weight: 600;
        color: #333;
      }
      .ut-item-pontos {
        color: #2196f3;
        font-weight: 600;
      }
      .ut-item-subfase {
        color: #999;
        font-size: 11px;
        margin-top: 2px;
      }

      .error {
        padding: 10px;
        background: #ffebee;
        border-left: 4px solid #f44336;
        border-radius: 3px;
        color: #c62828;
        font-size: 12px;
        margin-top: 8px;
      }

      .popup-content {
        padding: 8px;
        max-width: 200px;
      }

      .popup-title {
        font-weight: 600;
        margin-bottom: 4px;
      }
      .popup-stat {
        font-size: 12px;
        margin: 2px 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <h1>📊 Gerador de Pontos</h1>

        <div class="form-group">
          <label for="lote">Lote *</label>
          <input type="number" id="lote" placeholder="ID do lote" min="1" />
        </div>

        <div class="form-group">
          <label for="subfase">Subfase (opcional)</label>
          <select id="subfase">
            <option value="">Usar subfase da UT</option>
            <option value="ext_ferrovia">Extração de Ferrovia</option>
            <option value="ext_hidrografia_altimetria">
              Extração Hidrografia e Altimetria
            </option>
            <option value="ext_toponimos">Extração de Topônimos</option>
            <option value="ext_vias_deslocamento">
              Extração Vias de Deslocamento
            </option>
            <option value="ext_elemento_hidrografico">
              Extração Elemento Hidrográfico
            </option>
            <option value="ext_area_sem_dados">Extração Área sem Dados</option>
            <option value="ext_limites">Extração de Limites</option>
            <option value="ext_interseção_hidro_transporte">
              Extração Interseção Hidro×Transporte
            </option>
            <option value="ext_area_edificada">Extração Área Edificada</option>
            <option value="ext_edificacao">Extração de Edificação</option>
            <option value="ext_vegetacao">Extração de Vegetação</option>
            <option value="ext_planimetria">Extração de Planimetria</option>
          </select>
        </div>

        <button onclick="generatePoints()">Gerar Pontos 🚀</button>

        <div id="status"></div>
        <div id="results"></div>
      </div>

      <div class="map-container">
        <div id="map"></div>
      </div>
    </div>

    <script>
      let map;
      let currentData = null;

      // Inicializar mapa
      function initMap() {
        map = new maplibregl.Map({
          container: "map",
          style: "https://demotiles.maplibre.org/style.json",
          center: [-51, -14],
          zoom: 6,
        });

        map.on("load", () => {
          // Adicionar source vazio para feições
          map.addSource("uts-source", {
            type: "geojson",
            data: { type: "FeatureCollection", features: [] },
          });

          map.addSource("centroids-source", {
            type: "geojson",
            data: { type: "FeatureCollection", features: [] },
          });

          // Layer com preenchimento
          map.addLayer({
            id: "uts-fill",
            type: "fill",
            source: "uts-source",
            paint: {
              "fill-color": "#2196F3",
              "fill-opacity": 0.3,
            },
          });

          // Layer com borda
          map.addLayer({
            id: "uts-outline",
            type: "line",
            source: "uts-source",
            paint: {
              "line-color": "#1976D2",
              "line-width": 2,
            },
          });

          // Layer com labels (pontos)
          map.addLayer({
            id: "pontos-label",
            type: "symbol",
            source: "centroids-source",
            layout: {
              "text-field": ["get", "label"],
              "text-size": 14,
              "text-font": ["Open Sans Bold"],
              "text-anchor": "center",
              "text-allow-overlap": true,
            },
            paint: {
              "text-color": "#fff",
              "text-halo-color": "#2196F3",
              "text-halo-width": 3,
            },
          });

          // Click event para mostrar info
          map.on("click", "uts-fill", (e) => {
            if (e.features.length > 0) {
              const feature = e.features[0];
              const props = feature.properties;
              const popup = new maplibregl.Popup({ offset: 25 })
                .setHTML(
                  `
                <div class="popup-content">
                  <div class="popup-title">${props.nome}</div>
                  <div class="popup-stat"><b>${props.pontos.toFixed(1)}</b> pts</div>
                  <div class="popup-stat">Subfase: ${props.subfase || "N/A"}</div>
                </div>
              `,
                )
                .setLngLat(e.lngLat)
                .addTo(map);
            }
          });

          map.on("mouseenter", "uts-fill", () => {
            map.getCanvas().style.cursor = "pointer";
          });

          map.on("mouseleave", "uts-fill", () => {
            map.getCanvas().style.cursor = "";
          });
        });
      }

      // Gerar pontos
      async function generatePoints() {
        const loteId = document.getElementById("lote").value;
        const subfaseKey = document.getElementById("subfase").value;

        if (!loteId) {
          alert("Informe o ID do lote");
          return;
        }

        const status = document.getElementById("status");
        status.innerHTML =
          '<div class="loading"><div class="spinner"></div> Gerando pontos...</div>';

        try {
          const response = await fetch("/api/calcular/lote/agregado", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              lote_id: parseInt(loteId),
              subfase_key: subfaseKey || undefined,
            }),
          });

          if (!response.ok) {
            const err = await response.json();
            throw new Error(err.erro || "Erro ao gerar pontos");
          }

          const data = await response.json();
          currentData = data;
          displayResults(data);
          updateMap(data);
          status.innerHTML = "";
        } catch (err) {
          status.innerHTML = `<div class="error">❌ ${err.message}</div>`;
        }
      }

      // Exibir resultados na sidebar
      function displayResults(data) {
        const resultsDiv = document.getElementById("results");
        const totalPontos = data.total_pontos;
        const numUts = data.num_uts;
        const mediaPontos = (totalPontos / numUts).toFixed(1);

        let html = `
        <div class="results">
          <h3>📈 Resumo da Moldura</h3>
          <div class="stat">
            <span>UTs:</span>
            <span class="stat-value">${numUts}</span>
          </div>
          <div class="stat">
            <span>Total de pontos:</span>
            <span class="stat-value">${totalPontos.toFixed(1)}</span>
          </div>
          <div class="stat">
            <span>Média por UT:</span>
            <span class="stat-value">${mediaPontos}</span>
          </div>
          
          <div class="ut-list">
            ${data.uts
              .map(
                (ut) => `
              <div class="ut-item">
                <div class="ut-item-name">${ut.nome}</div>
                <div class="ut-item-pontos">${ut.score_total.toFixed(1)} pontos</div>
                <div class="ut-item-subfase">${ut.subfase_key || "N/A"}</div>
              </div>
            `,
              )
              .join("")}
          </div>
        </div>
      `;

        if (data.erros && data.erros.length > 0) {
          html += `<div class="error">⚠️ ${data.erros.length} UT(s) com erro</div>`;
        }

        resultsDiv.innerHTML = html;
      }

      // Atualizar mapa com geometrias e labels
      function updateMap(data) {
        if (!map.isStyleLoaded()) {
          map.once("load", () => updateMap(data));
          return;
        }

        const features = data.uts.map((ut) => ({
          type: "Feature",
          geometry: ut.geom,
          properties: {
            id: ut.id,
            nome: ut.nome,
            pontos: ut.score_total,
            subfase: ut.subfase_key,
          },
        }));

        // Atualizar source de UTs
        map.getSource("uts-source").setData({
          type: "FeatureCollection",
          features: features,
        });

        // Criar centroids para labels
        const centroids = features.map((f) => {
          const coords = f.geometry.coordinates;
          let center;

          if (f.geometry.type === "Polygon") {
            center = calculateCentroid(coords[0]);
          } else if (f.geometry.type === "MultiPolygon") {
            center = calculateCentroid(coords[0][0]);
          } else {
            center = coords;
          }

          return {
            type: "Feature",
            geometry: {
              type: "Point",
              coordinates: center,
            },
            properties: {
              label: f.properties.pontos.toFixed(1),
            },
          };
        });

        map.getSource("centroids-source").setData({
          type: "FeatureCollection",
          features: centroids,
        });

        // Zoom na moldura
        if (features.length > 0) {
          const bbox = getBounds(features);
          map.fitBounds(bbox, { padding: 40 });
        }
      }

      // Calcular centróide
      function calculateCentroid(coords) {
        let x = 0,
          y = 0,
          n = coords.length;
        for (let i = 0; i < n; i++) {
          x += coords[i][0];
          y += coords[i][1];
        }
        return [x / n, y / n];
      }

      // Calcular bounds
      function getBounds(features) {
        let minLng = Infinity,
          maxLng = -Infinity;
        let minLat = Infinity,
          maxLat = -Infinity;

        features.forEach((f) => {
          const coords = f.geometry.coordinates;
          const flatten = (arr) => {
            for (let item of arr) {
              if (Array.isArray(item[0])) flatten(item);
              else {
                minLng = Math.min(minLng, item[0]);
                maxLng = Math.max(maxLng, item[0]);
                minLat = Math.min(minLat, item[1]);
                maxLat = Math.max(maxLat, item[1]);
              }
            }
          };
          flatten(coords);
        });

        return [
          [minLng, minLat],
          [maxLng, maxLat],
        ];
      }

      // Inicializar
      initMap();
    </script>
  </body>
</html>
